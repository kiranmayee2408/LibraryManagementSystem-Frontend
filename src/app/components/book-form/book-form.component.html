<div class="form-container">
    <h2>{{ selectedBookId ? 'Edit Book' : 'Add New Book' }}</h2>

    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Title</label>
            <input formControlName="title" />
        </div>

        <div class="form-group">
            <label>Author</label>
            <input formControlName="author" />
        </div>

        <div class="form-group">
            <label>ISBN</label>
            <input formControlName="isbn" />
        </div>

        <div class="form-group">
            <label>Available Copies</label>
            <input type="number" formControlName="availableCopies" />
        </div>
        <div class="form-actions">
            <button type="submit" [disabled]="bookForm.invalid">
                {{ selectedBookId ? 'Update Book' : 'Add Book' }}
            </button>

            <button type="button" (click)="onReset()">Clear</button>

            <button *ngIf="selectedBookId" type="button" (click)="onDelete()" class="delete">
                Delete Book
            </button>
        </div>
    </form>
</div>
